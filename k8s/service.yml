apiVersion: apps/v1
kind: Deployment
metadata:
  name: properties-api
  namespace: agrosolutions-properties
  labels:
    app: properties-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: properties-api
  template:
    metadata:
      labels:
        app: properties-api
    spec:
      containers:
        - name: properties-api
          image: #{ImageName}#
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          envFrom:
            - configMapRef:
                name: properties-config

          env:
            
            - name: ConnectionStrings__Properties
              valueFrom:
                secretKeyRef:
                  name: properties-secret
                  key: PROPERTIES_CONNECTION_STRING
      
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: properties-secret
                  key: JWT_ISSUER

            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: properties-secret
                  key: JWT_AUDIENCE

            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: properties-secret
                  key: JWT_KEY

            - name: InfluxOptions__Token
              valueFrom:
                secretKeyRef:
                  name: properties-secret
                  key: INFLUX_TOKEN

          # HPA precisa de requests (principalmente CPU). Ajuste para sua realidade.
          resources:
            requests:
              cpu: "250m"
              memory: "400Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: properties-api
  namespace: agrosolutions-properties
  labels:
    app: properties-api
spec:
  type: ClusterIP
  selector:
    app: properties-api
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: properties-api
  namespace: agrosolutions-properties
  labels:
    app: properties-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: properties-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
